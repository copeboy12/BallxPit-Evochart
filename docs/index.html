<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BALL x PIT Evolution Chart</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand-mark">BxP</div>
    <div>
      <p class="eyebrow">Ball-fusing guide</p>
      <h1>BALL x PIT Evolution Chart</h1>
      <p class="subtitle">Search, filter, and click recipes to see real evolution paths.</p>
    </div>
  </header>

  <main class="layout">
    <section class="chart-shell">
      <div id="categoryTabs" class="tabs"></div>

      <div class="controls">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Try: burn, vampire lord, shadow, laser..." />
        </label>
        <button id="strictButton" class="tool-button">Match any selected</button>
        <button id="resetButton" class="tool-button">Reset</button>
      </div>

      <section class="filter-panel">
        <div class="filter-heading">
          <h2>Balls & Evolutions</h2>
          <span id="selectedCount">0 selected</span>
        </div>
        <div id="itemGrid" class="chip-grid"></div>
      </section>

      <div class="status-row">
        <strong id="matchCount">0 matches</strong>
        <span>Tip: click multiple balls, then switch between any/all matching.</span>
      </div>

      <section id="recipeGrid" class="recipe-grid" aria-live="polite"></section>
    </section>

    <aside id="detailPanel" class="detail-panel"></aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
